version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: skilllens_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jhic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jhic_password}
      POSTGRES_DB: ${POSTGRES_DB:-jhic_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: skilllens_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    container_name: skilllens_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-jhic_user}:${POSTGRES_PASSWORD:-jhic_password}@db:5432/${POSTGRES_DB:-jhic_db}
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/uploads:/app/uploads

  worker:
    build:
      context: ./backend
    container_name: skilllens_worker
    restart: always
    command: celery -A celery_app.celery worker --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-jhic_user}:${POSTGRES_PASSWORD:-jhic_password}@db:5432/${POSTGRES_DB:-jhic_db}
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: skilllens_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
